# Portal Scanner Configuration
# Maximized coverage for Senior DevOps / Platform / SRE / Cloud Engineer roles
# Target: ALL companies hiring in the USA

title_filter:
  positive:
    # -- DevOps --
    - "DevOps"
    - "DevSecOps"
    - "GitOps"
    # -- Platform --
    - "Platform Engineer"
    - "Platform"
    # -- SRE --
    - "Site Reliability"
    - "SRE"
    - "Reliability Engineer"
    # -- Cloud / Infrastructure --
    - "Cloud Engineer"
    - "Infrastructure Engineer"
    - "Cloud Infrastructure"
    - "AWS Engineer"
    - "Azure Engineer"
    - "GCP Engineer"
    # -- Systems --
    - "Systems Engineer"
    - "System Engineer"
    - "Linux Engineer"
    # -- Kubernetes / Containers --
    - "Kubernetes"
    - "Container"
    # -- CI/CD / Build --
    - "CI/CD"
    - "Build Engineer"
    - "Release Engineer"
    - "Automation Engineer"
    # -- Observability --
    - "Observability"
    - "Monitoring"
    # -- Security Ops --
    - "Security Engineer"
    - "Infrastructure Security"
    # -- Adjacent --
    - "Solutions Architect"
    - "Cloud Architect"
    - "Infrastructure Architect"
    - "Production Engineer"
    - "Ops Engineer"
  negative:
    - "Junior"
    - "Intern"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Frontend"
    - "React"
    - "UI/UX"
    - "Designer"
    - "Marketing"
    - "Sales"
    - "Recruiter"
    - "Data Analyst"
    - "Business Analyst"
  max_age_days: 7  # Skip job postings older than 7 days
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

